services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JOBMATE_DATABASE_URL: postgresql+asyncpg://jobmate:jobmate@postgres:5432/jobmate
      JOBMATE_REDIS_URL: redis://redis:6379/0
      JOBMATE_DEBUG: "false"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobmate
      POSTGRES_PASSWORD: jobmate
      POSTGRES_DB: jobmate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
